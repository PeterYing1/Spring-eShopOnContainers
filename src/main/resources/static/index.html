<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spring eShop MVP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">Spring Boot MVP</p>
      <h1>eShopOnContainers</h1>
    </div>
    <div class="header-actions">
      <span id="status" aria-live="polite"></span>
      <button id="checkout">Checkout</button>
    </div>
  </header>

  <main>
    <section id="shop-view">
      <div class="section-title">
        <h2>Catalog</h2>
        <span id="count"></span>
      </div>
      <div id="catalog" class="grid"></div>
    </section>

    <aside>
      <div class="section-title">
        <h2>Basket</h2>
        <span id="basket-total">$0.00</span>
      </div>
      <div id="basket"></div>
      <div class="orders">
        <div class="section-title">
          <h2>Orders</h2>
          <button id="refresh-orders">Refresh</button>
        </div>
        <div id="orders"></div>
      </div>
    </aside>

    <section id="payment-view" class="payment-view" hidden>
      <div class="section-title">
        <h2>Payment</h2>
        <button id="back-to-shop" class="secondary">Back to Shop</button>
      </div>
      <div id="payment-summary"></div>
      <div class="payment-actions">
        <button id="pay-order">Pay Order</button>
      </div>
    </section>

    <section id="credit-card-view" class="payment-view" hidden>
      <div class="section-title">
        <h2>Credit Card Payment</h2>
        <button id="back-to-payment" class="secondary">Back to Payment</button>
      </div>
      <div class="payment-layout">
        <div id="credit-card-summary"></div>
        <form id="credit-card-form" class="payment-card">
          <label>
            Cardholder Name
            <input id="card-holder" name="cardHolder" autocomplete="cc-name" required value="Demo User">
          </label>
          <label>
            Card Type
            <select id="card-type" name="cardType" required></select>
          </label>
          <label>
            Card Number
            <input id="card-number" name="cardNumber" autocomplete="cc-number" inputmode="numeric" required value="4012888888881881">
          </label>
          <div class="form-grid">
            <label>
              Expiration
              <input id="card-expiration" name="cardExpiration" autocomplete="cc-exp" required value="12/28">
            </label>
            <label>
              Security Code
              <input id="card-security" name="cardSecurity" autocomplete="cc-csc" inputmode="numeric" required value="123">
            </label>
          </div>
          <button type="submit" id="submit-card-payment">Submit Payment</button>
        </form>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
